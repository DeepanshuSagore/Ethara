name: Keep Render awake

on:
  schedule:
    # Render free tier spins down after 15 min of inactivity; GitHub cron
    # often fires a few minutes late, so ping every 10 min for margin.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        # Generous timeout + retries so a cold start doesn't fail the run.
        run: |
          curl -sSf --max-time 90 --retry 3 --retry-delay 10 --retry-all-errors \
            https://ethara-api-edmu.onrender.com/health
